spring.application.name=tienda
server.port=80

#Propiedades para conectarse a la base de datos
#URL para conectarse a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/supermercado

#Credenciales del user a conectar
spring.datasource.username=usuario_prueba
spring.datasource.password=Usuar1o_Clave.

#Driver y plataforma para la comunicacion
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Ajustes en el log del sistema
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=debug
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

#Esta información se utiliza para obtener acceso a su storage.
firebase.bucket.name=techshop-1d728.firebasestorage.app
firebase.storage.path=techshop
firebase.json.path=firebase
firebase.json.file=techshop-1d728-firebase-adminsdk-fbsvc-5904f0a3e2.json
