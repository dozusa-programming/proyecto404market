<!-- fragmento 1 para Mostrar las categorias en tabs -->
<section th:fragment="tabs" class="py-3 mb-4">

    <div class="d-flex justify-content-center px-5">
        <ul class="nav nav-underline">
            <li class="nav-item">
                <a class="nav-link" 
                   aria-current="page" }
                   th:href="@{/}">
                    [[#{pruebas.todas}]]</a>
            </li>
            <li th:each="c : ${categorias}"
                class="nav-item">
                <a class="nav-link" 
                   th:href="@{/consultas/{id}(id=${c.idCategoria})}">
                    [[${c.descripcion}]]</a>
            </li>
        </ul>
    </div>

</section>

<!-- fragmento 2 para mostrar los productos en tarjetas -->
<section th:fragment="tarjetas" class="container py-4">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
        <div th:each="p : ${productos}" class="col">
            <div class="card h-100 shadow-sm">
                <div class="d-flex justify-content-center align-items-center bg-light p-3"
                     style="height: 200px">
                    <img th:src="${p.rutaImagen}" class="img-fluid" 
                         alt="..." style="max-height: 100%; object-fit: contain">
                </div>
                <div class="card-header bg-white">
                    <h5 class="card-title text-center text-truncate mb-0">
                        [[${p.descripcion}]]
                    </h5>
                </div>
                <div class="card-body d-flex flex-column">
                    <p class="card-text text-muted mb-auto text-truncate">[[${p.detalle}]]</p>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <div class="fw-bold">
                        <span class="text-success h5">[[${#numbers.formatCurrency(p.precio)}]]</span>
                        <span th:if="${p.existencias > 0}" class="badge text-bg-success">[[${p.existencias}]] unidades</span>
                        <span th:if="${p.existencias < 1}" class="badge text-bg-danger">Agotado!</span>
                    </div>
                    <form th:action="@{/carrito/agregar}"
                          class="d-inline"
                          th:method="post">
                        <input type="hidden" th:value="${p.idProducto}" name="idProducto"/>
                        <button type="button"
                                class="btn btn-sm btn-primary"
                                th:disabled="${p.existencias < 1}"
                                onclick="addCart(this.form)">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- fragmento 3 donde aparecen los formularios para las consultas-->

<section th:fragment="consultas" class="row row-cols-4 p-2">
    <div th:replace="~{consultas/fragmentos :: formConsulta('primary', #{consultas.derivadas}, '/consultas/consultaDerivada')}"/>
    <div th:replace="~{consultas/fragmentos :: formConsulta('warning', #{consultas.jpql}, '/consultas/consultaJPQL')}"/>
    <div th:replace="~{consultas/fragmentos :: formConsulta('success', #{consultas.sql}, '/consultas/consultaSQL')}"/>
    <div th:replace="~{consultas/fragmentos :: formConsultaPractica2('dark', #{consultas.practica2}, '/consultas/consultaPractica2')}"/>
    
</section>

<!-- fragmento 4 para mostrar los formularios para las consultas-->
<div th:fragment="formConsulta(colorForm, textoForm, accionForm)">
    <div class="card p-2">
        <form method="post" th:action="@{${accionForm}}" class="was-validated">
            <div class="card-header text-center text-white" th:classappend="${'bg-' + colorForm}">
                <h5>[[${textoForm}]]</h5>
            </div>
            <div class="card-body">
                <div class='mb-3'>
                    <label>[[#{consultas.precio.inferior}]]</label>
                    <input type="number" name='precioInf'
                           th:value='${precioInf}' class='form-control'
                           min='0' required/>
                </div>
                <div class='mb-3'>
                    <label>[[#{consultas.precio.superior}]]</label>
                    <input type="number" name='precioSup'
                           th:value='${precioSup}' class='form-control'
                           min='0' required/>
                </div>
            </div>
            <div class='card-footer text-center'>
                <button type='submit' class='btn text-white'
                        th:classappend="${'bg-'+colorForm}">
                    <i class='fa-solid fa-magnifying-glass'></i> [[${textoForm}]]
                </button>
            </div>
        </form>
    </div>
</div>

<div th:fragment="formConsultaPractica2(colorForm, textoForm, accionForm)">
    <div class="card p-2">
        <form method="post" th:action="@{${accionForm}}" class="was-validated">
            <div class="card-header text-center text-white" th:classappend="${'bg-' + colorForm}">
                <h5>[[${textoForm}]]</h5>
            </div>
            <div class="card-body">
                <div class='mb-3'>
                    <label>[[#{consultas.precio.maximo}]]</label>
                    <input type="number" name='precioSup'
                           th:value='${precioSup}' class='form-control'
                           min='0' required/>
                </div>
            </div>
            <div class='card-footer text-center'>
                <button type='submit' class='btn text-white'
                        th:classappend="${'bg-'+colorForm}">
                    <i class='fa-solid fa-magnifying-glass'></i> [[${textoForm}]]
                </button>
            </div>
        </form>
    </div>
</div>
