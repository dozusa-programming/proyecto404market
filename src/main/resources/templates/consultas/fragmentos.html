<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ===== ASIDE: Menú lateral → HU9 ===== -->
<aside th:fragment="menuCategorias" class="bg-white border-end p-3"
       style="min-width:200px; width:200px;">
    <h6 class="text-uppercase text-muted fw-bold mb-3"
        th:text="#{plantilla.categorias}">Categorías</h6>
    <ul class="list-unstyled">
        <li class="mb-1">
            <a th:href="@{/}"
               class="d-block px-3 py-2 rounded text-decoration-none"
               th:classappend="${param.idCategoria == null and param.q == null} ? 'bg-success text-white' : 'text-dark'"
               th:text="#{pruebas.todas}">Todas</a>
        </li>
        <li class="mb-1" th:each="c : ${categorias}">
            <a th:href="@{/consultas/{id}(id=${c.idCategoria})}"
               class="d-block px-3 py-2 rounded text-decoration-none"
               th:classappend="${param.idCategoria != null and param.idCategoria == c.idCategoria.toString()} ? 'bg-success text-white' : 'text-dark'"
               th:text="${c.descripcion}">Categoría</a>
        </li>
    </ul>
</aside>

<!-- ===== TARJETAS DE PRODUCTOS → HU4, HU13 ===== -->
<th:block th:fragment="tarjetas">

    <!-- Grid de categorías en home -->
    <div th:if="${param.idCategoria == null and param.q == null}"
         class="row row-cols-2 row-cols-sm-3 row-cols-lg-4 g-3 mb-4">
        <div class="col" th:each="c : ${categorias}">
            <a th:href="@{/consultas/{id}(id=${c.idCategoria})}"
               class="card text-center text-decoration-none border-0 shadow-sm h-100 p-2">
                <img th:if="${c.rutaImagen != null}"
                     th:src="${c.rutaImagen}" th:alt="${c.descripcion}"
                     class="card-img-top rounded mx-auto mt-2"
                     style="width:80px; height:80px; object-fit:cover;"/>
                <img th:unless="${c.rutaImagen != null}"
                     src="https://placehold.co/80x80?text=Cat"
                     class="card-img-top rounded mx-auto mt-2"
                     style="width:80px; height:80px;"/>
                <div class="card-body p-1">
                    <small class="fw-semibold text-dark" th:text="${c.descripcion}">Cat</small>
                </div>
            </a>
        </div>
    </div>

    <!-- Título de sección -->
    <h5 th:if="${categoriaActual != null}"
        class="mb-3 text-secondary" th:text="${categoriaActual.descripcion}"></h5>
    <h5 th:if="${param.q != null}" class="mb-3 text-secondary">
        <i class="fas fa-search"></i>
        Resultados para: <span th:text="${param.q}"></span>
    </h5>

    <!-- Sin resultados -->
    <div th:if="${productos == null or productos.empty}"
         class="text-center text-muted py-5">
        <i class="fas fa-box-open fa-3x mb-3"></i>
        <p>No se encontraron productos.</p>
    </div>

    <!-- Grid de tarjetas → HU13 -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4"
         th:unless="${productos == null or productos.empty}">
        <div class="col" th:each="p : ${productos}">
            <div class="card h-100 shadow-sm">

                <!-- Imagen -->
                <div class="d-flex justify-content-center align-items-center bg-light p-3 position-relative"
                     style="height:180px;">
                    <img th:if="${p.rutaImagen != null}"
                         th:src="${p.rutaImagen}" th:alt="${p.descripcion}"
                         class="img-fluid" style="max-height:100%; object-fit:contain;"/>
                    <img th:unless="${p.rutaImagen != null}"
                         src="https://placehold.co/150x150?text=Producto"
                         class="img-fluid"/>
                  <span th:if="${p.descuento > 0}"
                        class="position-absolute top-0 start-0 badge bg-danger m-2"
                        th:text="'🏷️ -' + ${p.descuento} + '%'">
                  </span>

                </div>

                <!-- Nombre -->
                <div class="card-header bg-white">
                    <a th:href="@{/producto/{id}(id=${p.idProducto})}"
                       class="text-decoration-none text-dark">
                        <h6 class="card-title text-center text-truncate mb-0"
                            th:text="${p.descripcion}">Producto</h6>
                    </a>
                </div>


                <!-- Detalle -->
                <div class="card-body">
                    <p class="card-text text-muted small text-truncate"
                       th:text="${p.detalle}"></p>
                </div>

                <!-- Precio + stock + botón -->
                <!-- Precio + stock + botón -->
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <div>
                        <span class="text-success fw-bold"
                              th:text="${#numbers.formatDecimal(p.precio,1,'COMMA',2,'POINT')} + ' ₡'">
                            ₡0.00
                        </span>
                        <br/>
                        <span th:if="${p.existencias > 0}"
                              class="badge bg-success"
                              th:text="${p.existencias} + ' uds.'">Stock</span>
                        <span th:unless="${p.existencias > 0}"
                              class="badge bg-danger">Agotado</span>
                    </div>

                    <!-- ✅ Sin form aquí, solo botón con data attribute -->
                    <button type="button"
                            class="btn btn-sm btn-primary"
                            th:disabled="${p.existencias <= 0}"
                            th:attr="data-id=${p.idProducto}"
                            onclick="addCart(this)">
                        <i class="fas fa-cart-plus"></i>
                    </button>
                </div>


            </div>
        </div>
    </div>
        </div><!-- cierre del row de tarjetas -->

    <!-- ✅ Form único para carrito, fuera del th:each -->
    <form id="formCarrito" th:action="@{/carrito/agregar}" method="post" class="d-none">
        <input type="hidden" name="idProducto" id="carritoIdProducto"/>
    </form>

</th:block>


</html>
