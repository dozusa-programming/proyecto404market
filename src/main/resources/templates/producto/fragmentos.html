<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ===== FORMULARIO AGREGAR ===== -->
<section th:fragment="agregar">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold text-success">
                <i class="fas fa-box-open me-2"></i>
                <span th:text="#{producto.listado}">Listado de Productos</span>
            </h4>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalAgregar">
                <i class="fas fa-plus me-1"></i>
                <span th:text="#{producto.agregar}">Agregar Producto</span>
            </button>
        </div>
    </div>

    <!-- Modal Agregar -->
    <div class="modal fade" id="modalAgregar" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">
                        <i class="fas fa-plus-circle me-2"></i>
                        <span th:text="#{producto.agregar}">Agregar Producto</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white"
                            data-bs-dismiss="modal"></button>
                </div>
                <form action="/producto/guardar" method="post"
                      enctype="multipart/form-data">
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold"
                                       th:text="#{producto.categoria}">Categoría</label>
                                <select name="categoria.idCategoria" class="form-select" required>
                                    <option value="" th:text="#{producto.categoria}">-- Categoría --</option>
                                    <option th:each="c : ${categorias}"
                                            th:value="${c.idCategoria}"
                                            th:text="${c.descripcion}">Cat</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold"
                                       th:text="#{producto.descripcion}">Descripción</label>
                                <input type="text" name="descripcion" class="form-control" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold"
                                       th:text="#{producto.detalle}">Detalle</label>
                                <textarea name="detalle" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold"
                                       th:text="#{producto.precio}">Precio</label>
                                <input type="number" name="precio" step="0.01" min="0"
                                       class="form-control" required/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold"
                                       th:text="#{producto.existencias}">Existencias</label>
                                <input type="number" name="existencias" min="0"
                                       class="form-control" required/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Descuento %</label>
                                <input type="number" name="descuento" min="0" max="100"
                                       value="0" class="form-control"/>
                            </div>
                            <div class="col-md-6 d-flex align-items-center gap-2 mt-2">
                                <input type="checkbox" name="activo" value="true"
                                       class="form-check-input" id="activoAdd" checked/>
                                <label for="activoAdd" class="form-check-label fw-semibold"
                                       th:text="#{producto.activo}">Activo</label>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold"
                                       th:text="#{producto.imagen}">Imagen</label>
                                <input type="file" name="imagenFile"
                                       class="form-control" accept="image/*"/>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal"
                                th:text="#{accion.cerrar}">Cerrar</button>
                        <button type="submit" class="btn btn-success"
                                th:text="#{accion.guardar}">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<!-- ===== LISTADO ===== -->
<section th:fragment="listado">
    <div class="container mt-2">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-success">
                    <tr>
                        <th>#</th>
                        <th th:text="#{producto.descripcion}">Descripción</th>
                        <th th:text="#{producto.precio}">Precio</th>
                        <th th:text="#{producto.existencias}">Existencias</th>
                        <th>Total</th>
                        <th th:text="#{producto.imagen}">Imagen</th>
                        <th th:text="#{producto.categoria}">Categoría</th>
                        <th th:text="#{producto.activo}">Activo</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${productos == null or productos.empty}">
                        <td colspan="9" class="text-center text-muted py-4"
                            th:text="#{lista.vacia}">Lista vacía</td>
                    </tr>
                    <tr th:each="p : ${productos}">
                        <td th:text="${p.idProducto}"></td>
                        <td th:text="${p.descripcion}"></td>
                        <td th:text="${#numbers.formatDecimal(p.precio,1,'COMMA',2,'POINT')} + ' ₡'"></td>
                        <td th:text="${p.existencias}"></td>
                        <td th:text="${#numbers.formatDecimal(p.precio * p.existencias,1,'COMMA',2,'POINT')} + ' ₡'"></td>
                        <td>
                            <img th:if="${p.rutaImagen != null}"
                                 th:src="${p.rutaImagen}"
                                 style="width:50px; height:50px; object-fit:cover;"
                                 class="rounded"/>
                            <span th:unless="${p.rutaImagen != null}"
                                  class="text-muted small">Sin imagen</span>
                        </td>
                        <td th:text="${p.categoria != null ? p.categoria.descripcion : '-'}"></td>
                        <td>
                            <span th:if="${p.activo}" class="badge bg-success">Sí</span>
                            <span th:unless="${p.activo}" class="badge bg-danger">No</span>
                        </td>
                        <!-- ✅ CORREGIDO: th:attr en lugar de th:onclick -->
                        <td class="d-flex gap-1">
                            <a th:href="@{/producto/modificar/{id}(id=${p.idProducto})}"
                               class="btn btn-sm btn-warning">
                                <i class="fas fa-edit"></i>
                            </a>
                            <button class="btn btn-sm btn-danger"
                                    th:attr="data-id=${p.idProducto},data-nombre=${p.descripcion}"
                                    onclick="confirmarEliminar(this)">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
                <tfoot th:unless="${productos == null or productos.empty}">
                    <tr class="table-light fw-bold">
                        <td colspan="8" class="text-end"
                            th:text="#{producto.total}">Total</td>
                        <td th:text="${totalProductos}"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
        <a th:href="@{/}" class="btn btn-outline-secondary mt-2">
            <i class="fas fa-arrow-left me-1"></i>
            <span th:text="#{accion.regresar}">Regresar</span>
        </a>
    </div>
</section>

<!-- ===== EDITAR ===== -->
<section th:fragment="editar">
    <div class="container mt-4" style="max-width:700px;">
        <h4 class="fw-bold text-success mb-4">
            <i class="fas fa-edit me-2"></i>
            <span th:text="#{accion.actualizar}">Actualizar Producto</span>
        </h4>
        <form action="/producto/guardar" method="post"
              enctype="multipart/form-data" th:object="${producto}">
            <input type="hidden" th:field="*{idProducto}"/>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold"
                           th:text="#{producto.categoria}">Categoría</label>
                    <select name="categoria.idCategoria" class="form-select" required>
                        <option th:each="c : ${categorias}"
                                th:value="${c.idCategoria}"
                                th:text="${c.descripcion}"
                                th:selected="${producto.categoria != null and producto.categoria.idCategoria == c.idCategoria}">
                        </option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold"
                           th:text="#{producto.descripcion}">Descripción</label>
                    <input type="text" class="form-control" th:field="*{descripcion}" required/>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold"
                           th:text="#{producto.detalle}">Detalle</label>
                    <textarea class="form-control" rows="2" th:field="*{detalle}"></textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold"
                           th:text="#{producto.precio}">Precio</label>
                    <input type="number" step="0.01" min="0"
                           class="form-control" th:field="*{precio}" required/>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold"
                           th:text="#{producto.existencias}">Existencias</label>
                    <input type="number" min="0"
                           class="form-control" th:field="*{existencias}" required/>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Descuento %</label>
                    <input type="number" min="0" max="100"
                           class="form-control" th:field="*{descuento}"/>
                </div>
                <div class="col-md-6 d-flex align-items-center gap-2">
                    <input type="checkbox" class="form-check-input"
                           id="activoEdit" th:field="*{activo}"/>
                    <label for="activoEdit" class="form-check-label fw-semibold"
                           th:text="#{producto.activo}">Activo</label>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold"
                           th:text="#{producto.imagen}">Imagen</label>
                    <input type="file" name="imagenFile"
                           class="form-control" accept="image/*"/>
                    <img th:if="${producto.rutaImagen != null}"
                         th:src="${producto.rutaImagen}"
                         class="mt-2 rounded" style="height:80px; object-fit:cover;"/>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <a href="/producto/listado" class="btn btn-outline-secondary"
                   th:text="#{accion.regresar}">Regresar</a>
                <button type="submit" class="btn btn-success"
                        th:text="#{accion.actualizar}">Actualizar</button>
            </div>
        </form>
    </div>
</section>

<!-- ===== CONFIRMAR ELIMINAR ===== -->
<div th:fragment="confirmarEliminar"
     class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" th:text="#{accion.confirmar}">Confirmar eliminación</h5>
                <button type="button" class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>
                    <span th:text="#{accion.confirmar.texto1}">¿Realmente desea eliminar</span>
                    <strong id="nombreProducto"></strong>?
                </p>
                <p class="text-muted small"
                   th:text="#{accion.confirmar.texto2}">Esta acción no se puede reversar.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal"
                        th:text="#{accion.cerrar}">Cerrar</button>
                <form action="/producto/eliminar" method="post" class="d-inline">
                    <input type="hidden" name="idProducto" id="idProductoEliminar"/>
                    <button type="submit" class="btn btn-danger"
                            th:text="#{accion.eliminar}">Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>

</html>
