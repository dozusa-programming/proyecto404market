<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="#{lang.code}">
<head th:replace="~{general/fragmentos :: head}"></head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">

        <!-- Header -->
        <div class="card-header bg-success text-white text-center py-4">
            <h4 class="mb-0 fw-bold">
                <i class="fas fa-store me-2"></i>
                <span th:text="#{aplicacion.titulo}">Supermercado</span>
            </h4>
            <small th:text="#{plantilla.suTienda}">Su tienda en línea</small>
        </div>

        <div class="card-body p-4">

            <!-- Error de credenciales -->
            <div th:if="${param.error}"
                 class="alert alert-danger d-flex align-items-center py-2" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="#{error.login}">Credenciales erróneas</span>
            </div>

            <!-- Logout exitoso -->
            <div th:if="${param.logout}"
                 class="alert alert-success d-flex align-items-center py-2" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                Sesión cerrada correctamente.
            </div>
            <!-- Registro exitoso -->
            <div th:if="${param.registrado}"
                 class="alert alert-success d-flex align-items-center py-2">
                <i class="fas fa-check-circle me-2"></i>
                Registro exitoso. Podés iniciar sesión.
            </div>

            <!-- Formulario -->
            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold"
                           th:text="#{login.username}">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="fas fa-user text-success"></i>
                        </span>
                        <input type="text" id="username" name="username"
                               class="form-control"
                               th:placeholder="#{login.username}"
                               autofocus required/>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold"
                           th:text="#{login.password}">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="fas fa-lock text-success"></i>
                        </span>
                        <input type="password" id="password" name="password"
                               class="form-control"
                               th:placeholder="#{login.password}"
                               required/>
                        <button class="btn btn-outline-secondary" type="button"
                                onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-success btn-lg"
                            th:text="#{login.login}">Autenticar</button>
                </div>

                <div class="text-center">
                    <span class="text-muted small">¿No tenés cuenta?</span>
                    <a th:href="@{/registro/nuevo}"
                       class="text-success fw-semibold ms-1 small"
                       th:text="#{accion.registrar}">Registrarse</a>
                </div>

            </form>
        </div>

        <!-- Footer -->
        <div class="card-footer text-center bg-white py-3">
            <a th:href="@{/}" class="text-success text-decoration-none small">
                <i class="fas fa-arrow-left me-1"></i>
                Volver a la tienda
            </a>
        </div>

    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>

</body>
</html>
