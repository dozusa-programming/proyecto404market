<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ========== HEAD ========== -->
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{aplicacion.titulo}">TechShop</title>
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/fav/favicon-16x16.png}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/fav/favicon-32x32.png}"/>
    <link href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/webjars/font-awesome/7.0.1/css/all.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
    <script src="/webjars/jquery/3.7.1/jquery.min.js"></script>
    <script src="/webjars/popper.js/2.11.7/umd/popper.min.js"></script>
    <script src="/webjars/bootstrap/5.3.8/js/bootstrap.min.js"></script>
    <script th:src="@{/js/rutinas.js}"></script>
</head>

<!-- ========== HEADER ========== -->
<header th:fragment="header" class="header sticky-top bg-white shadow-sm">

    <!-- Barra superior: logo, búsqueda, modos, carrito, idioma, login -->
    <nav class="navbar navbar-expand-md px-3 py-2 border-bottom">
        <!-- Logo → HU17 -->
        <a th:href="@{/}" class="navbar-brand fw-bold text-success fs-4"
           th:text="#{aplicacion.titulo}">TechShop</a>

        <!-- Búsqueda → HU7 -->
        <form th:action="@{/buscar}" method="get" class="d-flex mx-3 flex-grow-1">
            <input class="form-control rounded-pill"
                   type="search" name="q"
                   th:value="${param.q}"
                   th:placeholder="#{plantilla.buscar}"/>
        </form>

        <div class="d-flex align-items-center gap-2 ms-auto">
            <!-- Botones modo → HU18 -->
            <a th:href="@{/}" class="btn btn-outline-success btn-sm rounded-pill"
               th:text="#{plantilla.tienda}">En tienda</a>
            <a th:href="@{/online}" class="btn btn-outline-success btn-sm rounded-pill"
               th:text="#{plantilla.online}">En línea</a>

            <!-- Carrito → HU5 -->
            <a th:href="@{/carrito}" class="btn btn-outline-secondary btn-sm position-relative">
                <i class="fas fa-shopping-cart"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      th:text="${session.cartCount != null ? session.cartCount : 0}">0</span>
            </a>

            <!-- Selector de idioma → HU3 (reutiliza ?lang=xx) -->
            <div class="dropdown">
                <a class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="fas fa-globe"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" th:href="@{/(lang=es)}">🇪🇸 Español</a></li>
                    <li><a class="dropdown-item" th:href="@{/(lang=en)}">🇺🇸 English</a></li>
                    <li><a class="dropdown-item" th:href="@{/(lang=fr)}">🇫🇷 Française</a></li>
                    <li><a class="dropdown-item" th:href="@{/(lang=pt)}">🇧🇷 Portugaise</a></li>
                </ul>
            </div>

            <!-- Login → HU1 -->
            <a th:href="@{/login}" class="btn btn-success btn-sm"
               th:text="#{plantilla.login}">Iniciar sesión</a>
        </div>
    </nav>

    <!-- Menú secundario → HU12 -->
    <nav class="navbar px-3 py-1 bg-success">
        <div class="d-flex align-items-center gap-3 w-100">
            <a th:href="@{/}" class="nav-link text-white fw-semibold"
               th:classappend="${#strings.isEmpty(param.categoria) and #strings.isEmpty(param.q)} ? ' text-decoration-underline'"
               th:text="#{plantilla.todos}">Todos los productos</a>

            <a th:href="@{/ofertas}" class="nav-link text-white"
               th:text="#{plantilla.ofertas}">Ofertas</a>

            <a th:href="@{/mis-productos}" class="nav-link text-white"
               th:text="#{plantilla.misProductos}">Mis productos</a>

            <!-- Región → HU8 -->
            <div class="ms-auto">
                <select class="form-select form-select-sm"
                        onchange="cambiarRegion(this.value)">
                    <option value="" th:text="#{plantilla.region}">Seleccione su región</option>
                    <option value="SJ">San José</option>
                    <option value="AL">Alajuela</option>
                    <option value="HE">Heredia</option>
                    <option value="CA">Cartago</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- Alertas -->
    <div class="container mt-2">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${todoOk}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
            <span th:text="${todoOk}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
</header>

<!-- ========== FOOTER ========== -->
<footer th:fragment="footer" class="p-2 mt-5 bg-success text-white">
    <p class="lead text-center mb-0">
        <span th:text="#{plantilla.suTienda}">TechShop</span>
        — <span th:text="#{plantilla.derechos}">Derechos reservados</span> ©
    </p>
</footer>

</html>
