<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ========== HEAD ========== -->
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{aplicacion.titulo}">TechShop</title>
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/fav/favicon-16x16.png}"/>
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/fav/favicon-32x32.png}"/>
    <link href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/webjars/font-awesome/7.0.1/css/all.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
    <script src="/webjars/jquery/3.7.1/jquery.min.js"></script>
    <script src="/webjars/popper.js/2.11.7/umd/popper.min.js"></script>
    <script src="/webjars/bootstrap/5.3.8/js/bootstrap.min.js"></script>
    <script th:src="@{/js/rutinas.js}"></script>
</head>

<!-- ========== HEADER ========== -->
<header th:fragment="header" class="sticky-top shadow-sm">

    <!-- ===== ÚNICA BARRA ===== -->
    <nav class="navbar px-3 py-2 bg-white border-bottom">
        <!-- Logo -->
        <a th:href="@{/}" class="navbar-brand fw-bold text-success fs-5"
           th:text="#{aplicacion.titulo}">Supermercado</a>

        <!-- Búsqueda -->
        <form th:action="@{/buscar}" method="get" class="d-flex flex-grow-1 mx-3">
            <input class="form-control" type="search" name="q"
                   th:value="${param.q}"
                   th:placeholder="#{plantilla.buscar}"/>
        </form>

        <!-- Botones modo -->
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/ofertas}" class="btn btn-outline-success btn-sm" th:text="#{plantilla.ofertas}">Ofertas</a>
            <a th:href="@{/}" class="btn btn-outline-success btn-sm"
               th:text="#{plantilla.tienda}">En tienda</a>
            <a th:href="@{/online}" class="btn btn-outline-success btn-sm"
               th:text="#{plantilla.online}">En línea</a>

            <!-- Carrito -->
            <a th:href="@{/carrito}" class="btn btn-outline-secondary btn-sm position-relative">
                <i class="fas fa-shopping-cart"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      th:text="${cantidadCarrito}"
                      th:if="${cantidadCarrito > 0}"></span>
            </a>

            <!-- Idioma -->
            <div class="dropdown">
                <a class="btn btn-outline-secondary btn-sm dropdown-toggle"
                   data-bs-toggle="dropdown">
                    <i class="fas fa-globe"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" th:href="@{/(lang=es)}">🇪🇸 Español</a></li>
                    <li><a class="dropdown-item" th:href="@{/(lang=en)}">🇺🇸 English</a></li>
                    <li><a class="dropdown-item" th:href="@{/(lang=fr)}">🇫🇷 Française</a></li>
                    <li><a class="dropdown-item" th:href="@{/(lang=pt)}">🇧🇷 Portugaise</a></li>
                </ul>
            </div>

            <!-- Anónimo -->
            <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                <a th:href="@{/registro/nuevo}" class="btn btn-outline-success btn-sm"
                   th:text="#{plantilla.registro}">Registrarse</a>
                <a th:href="@{/login}" class="btn btn-success btn-sm"
                   th:text="#{plantilla.login}">Iniciar sesión</a>
            </div>

            <!-- Autenticado -->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
                <span class="text-muted small">
                    <i class="fas fa-user-circle text-success"></i>
                    <span sec:authentication="name"></span>
                </span>
                <!-- Mis pedidos -->
                <a th:href="@{/pago/mis-pedidos}" class="btn btn-outline-secondary btn-sm"
                   th:text="#{plantilla.misProductos}">Mis pedidos</a>
                <!-- Logout -->
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </form>
            </div>

            <!-- Región -->
            <select class="form-select form-select-sm" style="width:auto;"
                    onchange="cambiarRegion(this.value)">
                <option value="" th:text="#{plantilla.region}">Región</option>
                <option value="SJ">San José</option>
                <option value="AL">Alajuela</option>
                <option value="HE">Heredia</option>
                <option value="CA">Cartago</option>
            </select>
        </div>
    </nav>

    <!-- Alertas -->
    <div class="container-fluid px-3">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2 mb-0" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${todoOk}" class="alert alert-success alert-dismissible fade show py-2 mb-0" role="alert">
            <span th:text="${todoOk}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
</header>


<!-- ========== FOOTER ========== -->
<footer th:fragment="footer" class="p-2 mt-5 bg-success text-white">
    <p class="lead text-center mb-0">
        <span th:text="#{plantilla.suTienda}">404 Market</span>
        — <span th:text="#{plantilla.derechos}">Derechos reservados</span> ©
    </p>
</footer>
<!-- ========== TOAST ========== -->
<div th:fragment="mostrarToast" class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toastMsg" class="toast align-items-center text-white border-0"
         role="alert" aria-live="assertive">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastBody"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>


</html>
