<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-srpingsecurity6">

<section th:fragment="carrito">
    <div class="container mt-4">
        <h4 class="fw-bold text-success mb-4">
            <i class="fas fa-shopping-cart me-2"></i>
            Mi Carrito
        </h4>

        <!-- Vacío -->
        <div th:if="${items == null or items.empty}" class="text-center py-5">
            <i class="fas fa-shopping-cart fa-4x text-muted mb-3"></i>
            <p class="text-muted fs-5">Tu carrito está vacío</p>
            <a href="/consultas/listado" class="btn btn-success mt-2">
                <i class="fas fa-store me-1"></i> Ver productos
            </a>
        </div>

        <!-- Con items -->
        <div th:unless="${items == null or items.empty}">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-success">
                        <tr>
                            <th>Producto</th>
                            <th>Precio unitario</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${items}">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <img th:if="${item.producto.rutaImagen != null}"
                                         th:src="${item.producto.rutaImagen}"
                                         style="width:50px; height:50px; object-fit:cover;"
                                         class="rounded"/>
                                    <span th:text="${item.producto.descripcion}"></span>
                                </div>
                            </td>
                            <td th:text="${#numbers.formatDecimal(item.producto.precio,1,'COMMA',2,'POINT')} + ' ₡'"></td>
                            <td style="width:150px;">
                                <form action="/carrito/actualizar" method="post"
                                      class="d-flex align-items-center gap-1">
                                    <input type="hidden" name="idCarrito" th:value="${item.idCarrito}"/>
                                    <button type="submit" name="cantidad"
                                            th:value="${item.cantidad - 1}"
                                            class="btn btn-sm btn-outline-secondary">−</button>
                                    <span class="px-2 fw-bold" th:text="${item.cantidad}"></span>
                                    <button type="submit" name="cantidad"
                                            th:value="${item.cantidad + 1}"
                                            class="btn btn-sm btn-outline-secondary">+</button>
                                </form>
                            </td>
                            <td th:text="${#numbers.formatDecimal(item.producto.precio * item.cantidad,1,'COMMA',2,'POINT')} + ' ₡'"></td>
                            <td>
                                <form action="/carrito/eliminar" method="post">
                                    <input type="hidden" name="idCarrito" th:value="${item.idCarrito}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Resumen -->
            <div class="row justify-content-end mt-3">
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="fw-bold mb-3">Resumen</h5>
                            <div class="d-flex justify-content-between mb-1">
                                <span>Subtotal</span>
                                <span th:text="${#numbers.formatDecimal(subtotal,1,'COMMA',2,'POINT')} + ' ₡'"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-1 text-muted small">
                                <span>IVA (13%)</span>
                                <span th:text="${#numbers.formatDecimal(impuesto,1,'COMMA',2,'POINT')} + ' ₡'"></span>
                            </div>
                            <hr/>
                            <div class="d-flex justify-content-between fw-bold fs-5">
                                <span>Total</span>
                                <span th:text="${#numbers.formatDecimal(total,1,'COMMA',2,'POINT')} + ' ₡'"></span>
                            </div>
                            <div class="d-grid gap-2 mt-3">
                                <!-- En carrito/fragmentos.html -->
                                <a href="/pago" class="btn btn-success">
                                    <i class="fas fa-credit-card me-1"></i> Pasar a pagar
                                </a>

                                <form action="/carrito/vaciar" method="post">
                                    <button type="submit" class="btn btn-outline-danger w-100">
                                        <i class="fas fa-trash me-1"></i> Vaciar carrito
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <a href="/consultas/listado" class="btn btn-outline-secondary mt-3">
                <i class="fas fa-arrow-left me-1"></i> Seguir comprando
            </a>
        </div>
    </div>
</section>

</html>
